<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JQ Protocol">
  <link rel="manifest" href="manifest.json">
  <title>Junker Queen Protocol</title>
  <style>
    :root{
      --bg:#0b0b0e;--card:#17171d;--card2:#202027;--line:#303039;
      --text:#f8f8fa;--muted:#a8a8b3;--orange:#ff7034;--gold:#ffd15c;
      --green:#67d391;--blue:#72d4ff;--danger:#ff6d75;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#09090b,#111116);color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select,textarea{font:inherit}
    .app{max-width:760px;margin:auto;padding:18px 14px 96px}
    .hero{padding:18px;border-radius:24px;background:
      radial-gradient(circle at 90% 10%,rgba(255,112,52,.22),transparent 36%),var(--card);
      border:1px solid var(--line)}
    h1{margin:7px 0 3px;font-size:1.9rem}
    h2{font-size:1.05rem;margin:22px 0 10px}
    .sub,.muted{color:var(--muted)}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,112,52,.15);
      color:#ffba92;font-size:.77rem;font-weight:800}
    .clock{font-weight:800;color:var(--gold);margin-top:8px}
    .coach{margin-top:12px;padding:13px;border-radius:15px;background:#241b14;border:1px solid #55351f}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
    @media(min-width:650px){.grid{grid-template-columns:repeat(4,1fr)}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px}
    .metric .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .metric .value{font-weight:900;font-size:1.3rem;margin-top:5px}
    .bar{height:8px;background:#2b2b32;border-radius:99px;overflow:hidden;margin-top:9px}
    .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold));transition:.25s}
    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .wide{grid-column:1/-1}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,select,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);
      border-radius:12px;padding:11px;outline:none}
    textarea{min-height:80px}
    button{border:0;border-radius:12px;padding:11px 13px;font-weight:800;cursor:pointer}
    .primary{background:linear-gradient(90deg,var(--orange),var(--gold));color:#1b110a}
    .secondary{background:#292930;color:var(--text);border:1px solid var(--line)}
    .danger{background:#3a2024;color:#ffd3d5}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
    .meal,.exercise,.dayrow{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}
    .meal{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .exercise{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
    .exercise input[type="checkbox"]{width:22px;height:22px;margin-top:2px}
    .exercise .perf{margin-top:8px}
    .exercise-head{display:flex;justify-content:space-between;gap:8px}
    .tag{font-size:.67rem;padding:3px 6px;border-radius:999px;background:rgba(255,209,92,.15);color:var(--gold)}
    .week{display:grid;gap:8px}
    .dayrow{display:grid;grid-template-columns:82px 1fr auto;gap:10px;align-items:center}
    .report{white-space:pre-wrap;background:#111116;border:1px dashed #4a4a54;border-radius:14px;padding:13px}
    .hidden{display:none}
    .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(10,10,13,.94);backdrop-filter:blur(14px);
      border-top:1px solid var(--line);padding:9px 10px calc(9px + env(safe-area-inset-bottom))}
    .navinner{max-width:760px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .nav button{padding:9px 4px;font-size:.72rem}
    .small{font-size:.82rem}
    .sep{height:1px;background:var(--line);margin:12px 0}
  </style>
</head>
<body>
<div class="app">
  <section class="hero">
    <span class="pill" id="dayPill">Standard Day</span>
    <h1>Junker Queen Protocol</h1>
    <div class="sub" id="dateText"></div>
    <div class="clock" id="clockText"></div>
    <div class="coach" id="coachBox"></div>
  </section>

  <section id="todayPage">
    <div class="grid">
      <div class="card metric"><div class="label">Kalorien</div><div class="value"><span id="kcalNow">0</span>/<span id="kcalGoal">0</span></div><div class="bar"><div id="kcalBar" class="fill"></div></div></div>
      <div class="card metric"><div class="label">Protein</div><div class="value"><span id="proteinNow">0</span>/<span id="proteinGoal">0</span>g</div><div class="bar"><div id="proteinBar" class="fill"></div></div></div>
      <div class="card metric"><div class="label">Steps</div><div class="value"><span id="stepsNow">0</span>/<span id="stepsGoal">0</span></div><div class="bar"><div id="stepsBar" class="fill"></div></div></div>
      <div class="card metric"><div class="label">Workout</div><div class="value"><span id="workoutPct">0</span>%</div><div class="bar"><div id="workoutBar" class="fill"></div></div></div>
    </div>

    <h2>Schnell aktualisieren</h2>
    <div class="card">
      <div class="formgrid">
        <div><label>Aktuelle Schritte</label><input id="stepsInput" type="number" min="0"></div>
        <div><label>Wasser hinzufügen (ml)</label><input id="waterInput" type="number" min="0"></div>
      </div>
      <div class="actions">
        <button class="primary" onclick="saveQuick()">Speichern</button>
        <button class="secondary" onclick="showPage('food')">Essen hinzufügen</button>
      </div>
    </div>

    <h2>Heute ist dran</h2>
    <div class="card" id="missionSummary"></div>
  </section>

  <section id="foodPage" class="hidden">
    <h2>Essen tracken</h2>
    <div class="card">
      <div class="formgrid">
        <div class="wide"><label>Lebensmittel / Meal</label><input id="mealName" placeholder="z. B. 50 g Chicken"></div>
        <div><label>Kalorien</label><input id="mealKcal" type="number" min="0"></div>
        <div><label>Protein (g)</label><input id="mealProtein" type="number" min="0"></div>
      </div>
      <button class="primary" style="width:100%;margin-top:10px" onclick="addMeal()">Zum Tag hinzufügen</button>
    </div>
    <h2>Heutige Meals</h2>
    <div id="mealList" style="display:grid;gap:8px"></div>
  </section>

  <section id="workoutPage" class="hidden">
    <h2 id="workoutTitle">Workout</h2>
    <div class="muted small" style="margin-bottom:10px">Körpergewicht + eine feste ca. 13-kg-Hantel</div>
    <div id="exerciseList" style="display:grid;gap:8px"></div>
    <h2>Extra hinzufügen</h2>
    <div class="card">
      <div class="formgrid">
        <div><label>Übung</label><input id="extraName" placeholder="z. B. 50 Curls"></div>
        <div><label>Leistung</label><input id="extraPerf" placeholder="z. B. 50 Wdh."></div>
      </div>
      <button class="secondary" style="width:100%;margin-top:10px" onclick="addExtra()">Extra Übung hinzufügen</button>
    </div>
  </section>

  <section id="weekPage" class="hidden">
    <h2>Diese Woche</h2>
    <div class="week" id="weekList"></div>
  </section>

  <section id="reportPage" class="hidden">
    <h2>Coach Report</h2>
    <div class="card">
      <div class="formgrid">
        <div><label>Gewicht optional</label><input id="weightInput" type="number" step="0.1"></div>
        <div><label>Energie 1–10</label><input id="energyInput" type="number" min="1" max="10"></div>
        <div><label>Hunger 1–10</label><input id="hungerInput" type="number" min="1" max="10"></div>
        <div><label>Wasser heute (ml)</label><input id="waterTotal" type="number" min="0"></div>
        <div class="wide"><label>Notiz</label><textarea id="notesInput"></textarea></div>
      </div>
      <button class="secondary" style="width:100%;margin-top:10px" onclick="saveCheckin()">Check-in speichern</button>
    </div>
    <div class="report" id="reportText" style="margin-top:12px"></div>
    <div class="actions">
      <button class="primary" onclick="copyReport()">Report kopieren</button>
      <button class="secondary" onclick="exportData()">Backup</button>
    </div>
  </section>
</div>

<nav class="nav">
  <div class="navinner">
    <button class="secondary" onclick="showPage('today')">Heute</button>
    <button class="secondary" onclick="showPage('food')">Essen</button>
    <button class="secondary" onclick="showPage('workout')">Training</button>
    <button class="secondary" onclick="showPage('week')">Woche</button>
    <button class="primary" onclick="showPage('report')">Report</button>
  </div>
</nav>

<script>
const DAY_DEFAULTS = {
  1:{type:"Standard",kcal:2150,protein:190,steps:15000,workout:"Push"},
  2:{type:"Grind",kcal:1900,protein:190,steps:22000,workout:"Pull"},
  3:{type:"Recovery",kcal:2300,protein:180,steps:10000,workout:"Legs + Core"},
  4:{type:"Standard",kcal:2050,protein:190,steps:15000,workout:"Push"},
  5:{type:"Grind",kcal:1900,protein:190,steps:22000,workout:"Pull"},
  6:{type:"Standard",kcal:2200,protein:185,steps:12000,workout:"Legs + Shoulders"},
  0:{type:"Recovery",kcal:2250,protein:180,steps:10000,workout:"Recovery"}
};

const WORKOUTS = {
  "Push":[
    ["Liegestütze","4 Sätze · 1–2 Wdh. im Tank"],
    ["Pike Push-ups","3 Sätze · langsam"],
    ["Einarmige Schulterpresse","4 Sätze je Seite · 13 kg"],
    ["Einarmiges Seitheben","3 Sätze je Seite"],
    ["Enge Liegestütze","3 Sätze · Trizeps"],
    ["Overhead-Trizepsstreckung","3 Sätze je Seite"]
  ],
  "Pull":[
    ["Einarmiges Rudern ohne Bank","5 Sätze je Seite"],
    ["Rear-Delt-Row","3 Sätze je Seite"],
    ["Bizepscurls","4 Sätze je Seite"],
    ["Hammer Curls","3 Sätze je Seite"],
    ["Langsame Negative Curls","3 Sätze · 4 Sek. ablassen"],
    ["Einarmige Shrugs","4 Sätze je Seite"]
  ],
  "Legs + Core":[
    ["Goblet Squats","5 Sätze · 13 kg"],
    ["Reverse Lunges","4 Sätze je Bein"],
    ["Einbeinige Romanian Deadlifts","4 Sätze je Bein"],
    ["Glute Bridges","4 Sätze · Pause oben"],
    ["Wadenheben einbeinig","4 Sätze je Seite"],
    ["Leg Raises","4 Sätze"],
    ["Plank","3 × 45–75 Sek."]
  ],
  "Legs + Shoulders":[
    ["Goblet Squats mit Pause","5 Sätze"],
    ["Split Squats ohne Möbel","4 Sätze je Bein"],
    ["Einbeinige Romanian Deadlifts","4 Sätze je Bein"],
    ["Einarmige Schulterpresse","4 Sätze je Seite"],
    ["Einarmiges Seitheben","4 Sätze je Seite"],
    ["Rear-Delt-Fly","3 Sätze je Seite"],
    ["Wadenheben","4 Sätze"]
  ],
  "Recovery":[
    ["Lockerer Spaziergang","20–45 Minuten"],
    ["Mobility","10 Minuten"],
    ["Dead Bug","3 leichte Sätze"],
    ["Ruhige Atmung","5 Minuten"]
  ]
};

let db = JSON.parse(localStorage.getItem("jqp_pwa_db") || "{}");

function keyFor(d=new Date()){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function ensureDay(date=new Date()){
  const key=keyFor(date);
  if(!db[key]){
    const def=DAY_DEFAULTS[date.getDay()];
    db[key]={date:key,type:def.type,kcalGoal:def.kcal,proteinGoal:def.protein,stepsGoal:def.steps,
      workout:def.workout,steps:0,water:0,meals:[],exercises:WORKOUTS[def.workout].map((x,i)=>({
        id:crypto.randomUUID(),name:x[0],target:x[1],done:false,performance:"",extra:false,order:i
      })),weight:"",energy:"",hunger:"",notes:"",reportGenerated:false};
    persist();
  }
  return db[key];
}
function persist(){localStorage.setItem("jqp_pwa_db",JSON.stringify(db));}
function sums(day){
  return day.meals.reduce((a,m)=>({kcal:a.kcal+m.kcal,protein:a.protein+m.protein}),{kcal:0,protein:0});
}
function pct(v,g){return Math.max(0,Math.min(100,g?Math.round(v/g*100):0));}
function workoutPct(day){
  const base=day.exercises.filter(e=>!e.extra);
  return base.length?Math.round(base.filter(e=>e.done).length/base.length*100):0;
}
function coach(day){
  const h=new Date().getHours(),s=sums(day),pr=s.protein/day.proteinGoal,sr=day.steps/day.stepsGoal,wp=workoutPct(day);
  if(h<11) return s.protein<30?["Protein zuerst","Starte mit 35–45 g Protein. Danach ist der Tag leichter kontrollierbar."]:["Starker Start","Protein läuft. Sammle entspannt die ersten Schritte."];
  if(h<16){
    if(pr<.45)return["Protein hängt zurück","Die nächste Mahlzeit sollte 45–60 g Protein bringen."];
    if(sr<.35)return["Kurzer Walk wäre perfekt","20–40 Minuten bringen dich wieder auf Kurs."];
    return["Du bist auf Kurs",`${day.workout} später sauber durchziehen.`];
  }
  if(h<20){
    if(wp<100)return[`${day.workout} ist noch offen`,"Starte nur mit dem ersten Satz."];
    if(sr<.8)return["Workout erledigt – Steps offen","Ein lockerer Abendwalk bringt dich Richtung Ziel."];
    return["Heute läuft","Jetzt Protein treffen und den Abend kontrolliert schließen."];
  }
  if(s.kcal>day.kcalGoal+250)return["Kein Alles-oder-nichts","Heute war höher. Küche schließen und morgen normal weitermachen."];
  if(!day.reportGenerated)return["Tagesreport abschließen","Energie, Hunger und Notiz eintragen und Report kopieren."];
  return["Mission abgeschlossen","Jetzt regenerieren und schlafen."];
}
function tier(day){
  const s=sums(day),w=workoutPct(day)===100,p=s.protein>=day.proteinGoal,k=s.kcal>0&&s.kcal<=day.kcalGoal+150,st=day.steps>=day.stepsGoal;
  if(w&&p&&k&&st)return"PLATINUM";if(w&&p&&st)return"GOLD";if(w&&p)return"SILVER";if(w)return"BRONZE";return"OFFEN";
}
function render(){
  const d=ensureDay(),s=sums(d),c=coach(d);
  document.getElementById("dayPill").textContent=d.type+" Day";
  document.getElementById("dateText").textContent=new Date().toLocaleDateString("de-AT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  document.getElementById("coachBox").innerHTML=`<strong>${c[0]}</strong><div class="small muted" style="margin-top:4px">${c[1]}</div>`;
  [["kcal",s.kcal,d.kcalGoal],["protein",s.protein,d.proteinGoal],["steps",d.steps,d.stepsGoal]].forEach(([id,v,g])=>{
    document.getElementById(id+"Now").textContent=v;
    document.getElementById(id+"Goal").textContent=g;
    document.getElementById(id+"Bar").style.width=pct(v,g)+"%";
  });
  const wp=workoutPct(d);document.getElementById("workoutPct").textContent=wp;document.getElementById("workoutBar").style.width=wp+"%";
  document.getElementById("stepsInput").value=d.steps||"";
  document.getElementById("waterTotal").value=d.water||"";
  document.getElementById("weightInput").value=d.weight||"";
  document.getElementById("energyInput").value=d.energy||"";
  document.getElementById("hungerInput").value=d.hunger||"";
  document.getElementById("notesInput").value=d.notes||"";
  document.getElementById("missionSummary").innerHTML=`<strong>${d.workout}</strong><div class="small muted" style="margin-top:5px">${d.exercises.filter(e=>!e.extra).map(e=>`${e.done?"✅":"⬜"} ${e.name}`).join("<br>")}</div><div class="sep"></div><strong>Tagesrang: ${tier(d)}</strong>`;
  renderMeals();renderExercises();renderWeek();renderReport();
}
function renderMeals(){
  const d=ensureDay(),el=document.getElementById("mealList");el.innerHTML="";
  if(!d.meals.length){el.innerHTML='<div class="card muted small">Noch nichts eingetragen.</div>';return;}
  d.meals.slice().reverse().forEach(m=>{
    const row=document.createElement("div");row.className="meal";
    row.innerHTML=`<div><strong>${m.name}</strong><div class="muted small">${m.kcal} kcal · ${m.protein} g Protein</div></div><button class="danger" onclick="deleteMeal('${m.id}')">Löschen</button>`;
    el.appendChild(row);
  });
}
function renderExercises(){
  const d=ensureDay();document.getElementById("workoutTitle").textContent=d.workout;
  const el=document.getElementById("exerciseList");el.innerHTML="";
  d.exercises.sort((a,b)=>a.order-b.order).forEach(e=>{
    const row=document.createElement("div");row.className="exercise";
    row.innerHTML=`<input type="checkbox" ${e.done?"checked":""} onchange="toggleExercise('${e.id}',this.checked)">
      <div><div class="exercise-head"><div><strong>${e.name}</strong>${e.extra?' <span class="tag">EXTRA</span>':''}</div>${e.extra?`<button class="danger" onclick="deleteExercise('${e.id}')">×</button>`:""}</div>
      <div class="muted small">${e.target}</div><input class="perf" value="${e.performance||""}" placeholder="Ergebnis, z. B. 4×18" onchange="savePerformance('${e.id}',this.value)"></div>`;
    el.appendChild(row);
  });
}
function renderWeek(){
  const el=document.getElementById("weekList");el.innerHTML="";
  const now=new Date(),day=(now.getDay()+6)%7,monday=new Date(now);monday.setDate(now.getDate()-day);
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);const x=ensureDay(d),s=sums(x);
    const row=document.createElement("div");row.className="dayrow";
    row.innerHTML=`<strong>${d.toLocaleDateString("de-AT",{weekday:"short"})}</strong><div><span class="pill">${x.type}</span><div class="muted small">${x.workout}</div></div><div class="small">${s.kcal} kcal<br>${s.protein}g · ${x.steps} Steps</div>`;
    el.appendChild(row);
  }
}
function renderReport(){
  const d=ensureDay(),s=sums(d),text=`JUNKER QUEEN PROTOCOL
${new Date().toLocaleString("de-AT")}

Tag: ${d.type}
Kalorien: ${s.kcal} / ${d.kcalGoal} kcal
Protein: ${s.protein} / ${d.proteinGoal} g
Schritte: ${d.steps} / ${d.stepsGoal}
Wasser: ${d.water} ml
Workout: ${d.workout} – ${workoutPct(d)===100?"erledigt":"offen"}
Rang: ${tier(d)}
Gewicht: ${d.weight||"–"} kg
Energie: ${d.energy||"–"}/10
Hunger: ${d.hunger||"–"}/10
Notiz: ${d.notes||"–"}`;
  document.getElementById("reportText").textContent=text;
}
function saveQuick(){const d=ensureDay(),st=Number(document.getElementById("stepsInput").value),w=Number(document.getElementById("waterInput").value);if(st>=0)d.steps=st;if(w>0)d.water+=w;document.getElementById("waterInput").value="";persist();render();}
function addMeal(){const d=ensureDay(),n=document.getElementById("mealName").value.trim(),k=Number(document.getElementById("mealKcal").value),p=Number(document.getElementById("mealProtein").value);if(!n||!Number.isFinite(k)||!Number.isFinite(p))return;d.meals.push({id:crypto.randomUUID(),name:n,kcal:k,protein:p,time:new Date().toISOString()});persist();["mealName","mealKcal","mealProtein"].forEach(id=>document.getElementById(id).value="");render();}
function deleteMeal(id){const d=ensureDay();d.meals=d.meals.filter(m=>m.id!==id);persist();render();}
function toggleExercise(id,v){const e=ensureDay().exercises.find(x=>x.id===id);if(e)e.done=v;persist();render();}
function savePerformance(id,v){const e=ensureDay().exercises.find(x=>x.id===id);if(e)e.performance=v;persist();renderReport();}
function addExtra(){const d=ensureDay(),n=document.getElementById("extraName").value.trim(),p=document.getElementById("extraPerf").value.trim();if(!n)return;d.exercises.push({id:crypto.randomUUID(),name:n,target:p||"Extra Leistung",done:true,performance:p,extra:true,order:d.exercises.length+1});persist();document.getElementById("extraName").value="";document.getElementById("extraPerf").value="";render();}
function deleteExercise(id){const d=ensureDay();d.exercises=d.exercises.filter(e=>e.id!==id);persist();render();}
function saveCheckin(){const d=ensureDay();d.weight=document.getElementById("weightInput").value;d.energy=document.getElementById("energyInput").value;d.hunger=document.getElementById("hungerInput").value;d.water=Number(document.getElementById("waterTotal").value)||d.water;d.notes=document.getElementById("notesInput").value.trim();persist();render();}
async function copyReport(){const d=ensureDay();d.reportGenerated=true;persist();const text=document.getElementById("reportText").textContent;try{await navigator.clipboard.writeText(text);alert("Report kopiert.");}catch(e){prompt("Kopieren:",text);}render();}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}));a.download="jqp-backup.json";a.click();URL.revokeObjectURL(a.href);}
function showPage(p){["today","food","workout","week","report"].forEach(x=>document.getElementById(x+"Page").classList.toggle("hidden",x!==p));render();}
setInterval(()=>document.getElementById("clockText").textContent=new Date().toLocaleTimeString("de-AT",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),1000);
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
render();
</script>
</body>
</html>
